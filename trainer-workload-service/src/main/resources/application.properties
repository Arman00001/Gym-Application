spring.application.name=trainer-workload-service

spring.datasource.url=jdbc:h2:mem:trainer_workload_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


spring.security.user.name=admin
spring.security.user.password=admin123

# Eureka Setup
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


# Shared JWT secret
jwt.secret=some-secret

# Logging
logging.pattern.level="%5p [transactionId:%X{transactionId}]"

# Messaging
app.messaging.trainer-workload-queue=trainer-workload-message-queue

spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin1

concurrency-level=1-1